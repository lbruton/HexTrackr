services:
  hextrackr:
    container_name: hextrackr-app
    build:
      context: .
      dockerfile: Dockerfile
    ports:
      - "8989:8080"
    volumes:
      # Persistent data — all named volumes
      - hextrackr-database:/app/app/data
      - hextrackr-backups:/app/backups
      - hextrackr-uploads:/app/app/uploads
      # Config from repo (read-only)
      - ./config:/app/config:ro
    environment:
      - NODE_ENV=${NODE_ENV:-production}
      - HEXTRACKR_VERSION=1.1.12
      - PORT=8080
      - SESSION_SECRET=${SESSION_SECRET}
      - TRUST_PROXY=true
      - USE_HTTPS=false
      - ENABLE_WEBSOCKET=true
      - ENABLE_COMPRESSION=true
      - ENABLE_RATE_LIMITING=true
      - LOG_LEVEL=info
      - NODE_OPTIONS=--max-old-space-size=4096
    restart: unless-stopped
    stop_grace_period: 30s
    healthcheck:
      test: ["CMD", "node", "-e", "const http = require('http'); http.get('http://127.0.0.1:8080/health', (res) => process.exit(res.statusCode === 200 ? 0 : 1))"]
      interval: 30s
      timeout: 3s
      retries: 3
      start_period: 10s

volumes:
  hextrackr-database:
    driver: local
  hextrackr-backups:
    driver: local
  hextrackr-uploads:
    driver: local

repos:
  - repo: https://github.com/gitleaks/gitleaks
    rev: v8.18.4
    hooks:
      - id: gitleaks
  - repo: local
    hooks:
      - id: hextrackr-pre-commit
        name: HexTrackr pre-commit checks
        entry: bash .githooks/pre-commit
        language: system
        pass_filenames: false
        always_run: true
